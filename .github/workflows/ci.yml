name: Run CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run ktlint
        run: |
          curl -sSLo ktlint https://github.com/pinterest/ktlint/releases/download/1.2.1/ktlint
          chmod +x ktlint
          ./ktlint "src/**/*.kt"

      - name: Run tests
        run: ./mvnw test

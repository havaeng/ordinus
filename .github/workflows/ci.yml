name: Run CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run ktlint
        run: |
          curl -sSLo ktlint https://github.com/pinterest/ktlint/releases/download/1.2.1/ktlint
          chmod +x ktlint
          ./ktlint "src/**/*.kt"

      - name: Run tests
        run: ./gradlew test

      - name: Build backend container image
        run: docker build --tag ordinus-api:ci .

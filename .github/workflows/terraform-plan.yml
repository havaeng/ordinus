name: Terraform production plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/terraform/environments/prod/**"
      - ".github/workflows/terraform-apply.yml"
      - ".github/workflows/terraform-plan.yml"

permissions:
  contents: read

jobs:
  plan:
    name: Plan production
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-plan
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    concurrency:
      group: terraform-production-plan-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: infra/terraform/environments/prod
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_resource_group_name: rg-ordinus-prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.5

      - name: Initialize Terraform
        run: terraform init -input=false

      - name: Plan production
        id: plan
        shell: bash
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -input=false \
            -lock=false \
            -no-color \
            > terraform-plan.txt 2>&1
          plan_exit_code=$?
          set -e

          cat terraform-plan.txt
          echo "exit_code=$plan_exit_code" >> "$GITHUB_OUTPUT"

          if [ "$plan_exit_code" -eq 0 ]; then
            echo "## Terraform production plan: no changes" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$plan_exit_code" -eq 2 ]; then
            echo "## Terraform production plan: changes detected" >> "$GITHUB_STEP_SUMMARY"
            echo "Review the plan output in the workflow log." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Terraform production plan: failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Review the error in the workflow log." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Publish plan on pull request
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- terraform-production-plan -->";
            const planPath = "infra/terraform/environments/prod/terraform-plan.txt";
            const exitCode = "${{ steps.plan.outputs.exit_code }}";

            const statuses = {
              "0": "✅ No changes",
              "2": "🟡 Changes detected",
              "1": "❌ Plan failed",
            };
            const status = statuses[exitCode] ?? "❌ Plan did not run";

            let plan = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, "utf8")
              : "Terraform did not produce plan output. Check the workflow run.";
            const planWasTruncated = plan.length > 12000;
            plan = plan.slice(0, 12000);
            const escapedPlan = plan
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;");
            const truncationNotice = planWasTruncated
              ? "\n\nThe comment was truncated. Open the workflow run for the complete plan."
              : "";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}
            ## Terraform production plan

            **Result:** ${status}

            [Open workflow run](${runUrl})

            <details>
            <summary>Show plan output</summary>

            <pre>${escapedPlan}</pre>
            ${truncationNotice}
            </details>

            _This comment is updated automatically when the plan runs again._`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existingComment = comments.find(comment =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/medalj
    username: medalj
    password: medalj

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  cloud:
    azure:
      storage:
        blob:
          connection-string: UseDevelopmentStorage=true

app:
  medals:
    container-name: medal-pictures
  blob:
    seed:
      enabled: true
      unmatched-log-path: build/blob-seed-unmatched.txt

server:
  port: 8080


